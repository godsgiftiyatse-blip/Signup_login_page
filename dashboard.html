<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
    }

    .dashboard {
      text-align: center;
      padding: 30px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      width: 90%;
      max-width: 500px;
    }

    h1 {
      margin-bottom: 10px;
    }

    p {
      opacity: 0.8;
      margin-bottom: 20px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #ef4444;
      color: white;
      cursor: pointer;
      font-size: 1rem;
      transition: 0.3s;
    }

    button:hover {
      background: #dc2626;
    }
  </style>
</head>

<body>

  <div class="dashboard">
    <h1>Welcome 👋</h1>
    <p id="userText">You are successfully logged in.</p>

    <button onclick="logout()">Logout</button>
  </div>

  <script>
    // Simple check (temporary frontend protection)
    const user = localStorage.getItem("user");

    if (!user) {
      window.location.href = "login.html";
    } else {
      document.getElementById("userText").innerText =
        "Logged in as: " + user;
    }

    function logout() {
      localStorage.removeItem("user");
      window.location.href = "login.html";
    }
  </script>

</body>
</html>
