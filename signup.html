<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="script.js" defer></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:
    radial-gradient(circle at 80% 80%, rgba(0,255,255,.25), transparent 30%),
    linear-gradient(135deg,#0f172a,#1e3a8a);
    color:white;
}

.card{
    width:100%;
    max-width:430px;
    padding:35px;
    border-radius:30px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.title{
    text-align:center;
    font-size:2rem;
    font-weight:bold;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:600;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:16px;
    margin-bottom:18px;
    background:rgba(255,255,255,.12);
    color:white;
    font-size:15px;
}

input::placeholder{
    color:#cbd5e1;
}

.signup-btn{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    background:linear-gradient(90deg,#2563eb,#3b82f6);
    color:white;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}

.signup-btn:disabled{
    opacity:.7;
    cursor:not-allowed;
}

.divider{
    display:flex;
    align-items:center;
    margin:25px 0;
}

.divider::before,
.divider::after{
    content:"";
    flex:1;
    height:1px;
    background:rgba(255,255,255,.25);
}

.divider span{
    padding:0 15px;
    color:#cbd5e1;
}

.social-btn{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,.12);
    color:white;
    cursor:pointer;
    font-size:15px;
}

.error{
    color:#f87171;
    text-align:center;
    margin-top:15px;
}

.login-link{
    margin-top:20px;
    text-align:center;
    color:#cbd5e1;
}

.login-link a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="card">

    <h1 class="title">Create Account</h1>
    <p class="subtitle">Join the community</p>

    <label>Full Name</label>
    <input id="fullName" type="text" placeholder="Enter your full name">

    <label>Email Address</label>
    <input id="email" type="email" placeholder="Enter your email">

    <label>Password</label>
    <input id="password" type="password" placeholder="Create a password">

    <label>Confirm Password</label>
    <input id="confirmPassword" type="password" placeholder="Confirm password">

    <button id="signupBtn" class="signup-btn" onclick="handleSignup()">
        Create Account
    </button>

    <div class="divider">
        <span>OR</span>
    </div>

    <button class="social-btn" type="button">
        Continue with Google
    </button>

    <button class="social-btn" type="button">
        Continue with GitHub
    </button>

    <div class="login-link">
        Already have an account?
        <a href="login.html">Login</a>
    </div>

    <p id="errorText" class="error"></p>

</div>

<script>
async function handleSignup() {

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const confirmPassword =
        document.getElementById("confirmPassword").value.trim();

    const btn = document.getElementById("signupBtn");
    const errorText = document.getElementById("errorText");

    errorText.innerText = "";

    if (!email || !password || !confirmPassword) {
        errorText.innerText = "Please fill in all fields";
        return;
    }

    if (password !== confirmPassword) {
        errorText.innerText = "Passwords do not match";
        return;
    }

    btn.disabled = true;
    btn.innerText = "Creating Account...";

    try {
        await signup(email, password);
    } catch (err) {
        console.error(err);
        errorText.innerText =
            err.message || "Signup failed. Try again.";
    } finally {
        btn.disabled = false;
        btn.innerText = "Create Account";
    }
}
</script>

</body>
</html>
