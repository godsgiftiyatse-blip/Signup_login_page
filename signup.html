<!DOCTYPE html>
<html>
<head>
<title>Sign Up</title>
<style>
body{
    font-family:Arial,sans-serif;
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    background:white;
    padding:30px;
    border-radius:10px;
    width:300px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#38bdf8;
    color:white;
    border:none;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="container">
    <h2>Create Account</h2>

    <input type="text" placeholder="Full Name">

    <input type="email" placeholder="Email">

    <input type="password" placeholder="Password">

    <button>Sign Up</button>
</div>

</body>
</html>
