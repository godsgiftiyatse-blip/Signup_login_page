<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome | My Website</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 500px;
      padding: 20px;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1rem;
      opacity: 0.8;
      margin-bottom: 30px;
    }

    .buttons {
      display: flex;
      gap: 15px;
      justify-content: center;
    }

    a {
      text-decoration: none;
      padding: 12px 25px;
      border-radius: 8px;
      font-weight: bold;
      transition: 0.3s;
    }

    .login {
      background: #3b82f6;
      color: white;
    }

    .login:hover {
      background: #2563eb;
    }

    .signup {
      background: transparent;
      border: 2px solid #3b82f6;
      color: #3b82f6;
    }

    .signup:hover {
      background: #3b82f6;
      color: white;
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Welcome 👋</h1>
    <p>Access your account or create a new one to get started.</p>

    <div class="buttons">
      <a href="login.html" class="login">Login</a>
      <a href="signup.html" class="signup">Sign Up</a>
    </div>
  </div>

</body>
</html>
