<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRISCO Login</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:
    radial-gradient(circle at top left,#1f5eff 0%,transparent 30%),
    radial-gradient(circle at bottom right,#00bfff 0%,transparent 25%),
    #020817;
    position:relative;
}

body::before{
    content:"";
    position:absolute;
    width:700px;
    height:700px;
    left:-250px;
    top:-250px;
    background:radial-gradient(#2563eb,transparent 70%);
    filter:blur(120px);
}

body::after{
    content:"";
    position:absolute;
    width:500px;
    height:500px;
    right:-150px;
    bottom:-150px;
    background:radial-gradient(#00bfff,transparent 70%);
    filter:blur(120px);
}

.container{
    width:90%;
    max-width:1400px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:80px;
    position:relative;
    z-index:2;
}

.brand{
    flex:1;
    color:white;
    text-align:left;
}

.frisco-logo{
    width:min(360px,80%);
    display:block;
    filter:
    drop-shadow(0 0 10px rgba(37,99,235,.8))
    drop-shadow(0 0 25px rgba(37,99,235,.7))
    drop-shadow(0 0 50px rgba(56,189,248,.5));
}

.brand-name{
    margin-top:20px;
    font-size:72px;
    font-weight:800;
    letter-spacing:12px;
}

.tagline{
    margin-top:15px;
    color:#9ca3af;
    letter-spacing:6px;
    font-size:18px;
}

.login-card{
    width:520px;
    padding:45px;
    border-radius:32px;
    background:rgba(255,255,255,0.04);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,0.12);
    box-shadow:
    0 0 40px rgba(0,191,255,.18),
    inset 0 0 25px rgba(255,255,255,.03);
}

.logo-small{
    text-align:center;
    color:white;
}

.small-logo{
    width:70px;
    margin:auto;
    display:block;
    filter:
    drop-shadow(0 0 10px rgba(37,99,235,.8))
    drop-shadow(0 0 20px rgba(56,189,248,.6));
}

.logo-small h1{
    margin-top:10px;
    letter-spacing:8px;
}

.logo-small p{
    color:#9ca3af;
    margin-top:8px;
}

.form-group{
    margin-top:25px;
}

.form-group label{
    color:white;
    display:block;
    margin-bottom:10px;
}

.input-box{
    position:relative;
}

.input-box i{
    position:absolute;
    left:18px;
    top:50%;
    transform:translateY(-50%);
    color:#94a3b8;
}

.input-box input{
    width:100%;
    height:58px;
    padding-left:55px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.08);
    background:rgba(255,255,255,.05);
    outline:none;
    color:white;
}

.input-box input::placeholder{
    color:#64748b;
}

.input-box input:focus{
    border-color:#38bdf8;
    box-shadow:0 0 15px rgba(56,189,248,.3);
}

.options{
    margin-top:18px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    color:#94a3b8;
    font-size:14px;
}

.options a{
    color:#38bdf8;
    text-decoration:none;
}

.login-btn{
    width:100%;
    height:60px;
    margin-top:25px;
    border:none;
    border-radius:18px;
    cursor:pointer;
    color:white;
    font-size:22px;
    font-weight:600;
    background:linear-gradient(90deg,#4338ca,#2563eb,#38bdf8);
    box-shadow:0 0 20px rgba(37,99,235,.5);
    transition:0.3s ease;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 30px rgba(56,189,248,.6);
}

.divider{
    margin:30px 0;
    text-align:center;
    color:#94a3b8;
    position:relative;
}

.divider::before,
.divider::after{
    content:"";
    position:absolute;
    width:35%;
    height:1px;
    background:#334155;
    top:50%;
}

.divider::before{ left:0; }
.divider::after{ right:0; }

.social-btn{
    width:100%;
    height:58px;
    border-radius:16px;
    border:1px solid rgba(255,255,255,.12);
    background:transparent;
    color:white;
    margin-bottom:15px;
    cursor:pointer;
    font-size:18px;
    transition:0.3s;
}

.social-btn:hover{
    background:rgba(255,255,255,0.05);
}

.social-btn i{
    margin-right:10px;
}

.signup{
    margin-top:20px;
    text-align:center;
    color:#94a3b8;
}

.signup a{
    color:#38bdf8;
    text-decoration:none;
    font-weight:600;
}

@media(max-width:1000px){
    .container{
        flex-direction:column;
        text-align:center;
    }

    .brand{
        display:none;
    }

    .login-card{
        width:100%;
        max-width:520px;
    }
}
</style>
</head>

<body>

<div class="container">

    <div class="brand">

        <img src="frisco-logo.svg"
             alt="Frisco Logo"
             class="frisco-logo">

        <h1 class="brand-name">FRISCO</h1>

        <div class="tagline">
            FUTURE. REDEFINED.
        </div>

    </div>

    <div class="login-card">

        <div class="logo-small">
            <img src="frisco-logo.svg" alt="Frisco Logo" class="small-logo">
            <h1>FRISCO</h1>
            <p>Welcome back</p>
        </div>

        <form>
            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-box">
                    <i class="fa-regular fa-user" aria-hidden="true"></i>
                    <input type="email" id="email" name="email" placeholder="Enter your email" required autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <div class="input-box">
                    <i class="fa-solid fa-lock" aria-hidden="true"></i>
                    <input type="password" id="password" name="password" placeholder="Enter your password" required autocomplete="current-password">
                </div>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox"> Remember me
                </label>
                <a href="#">Forgot password?</a>
            </div>

            <button class="login-btn" type="submit">Log In →</button>
        </form>

        <div class="divider">or continue with</div>

        <button class="social-btn">
            <i class="fa-brands fa-google"></i>
            Continue with Google
        </button>

        <button class="social-btn">
            <i class="fa-brands fa-apple"></i>
            Continue with Apple
        </button>

        <div class="signup">
            Don't have an account?
            <a href="#">Sign up</a>
        </div>

    </div>

</div>

</body>
</html>
