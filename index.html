<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRISCO</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Helvetica, Arial, sans-serif;
}

body{
    background:#f0f2f5;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:1100px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:60px;
}

.left{
    flex:1;
}

.logo{
    font-size:4rem;
    font-weight:700;
    color:#1877f2;
    margin-bottom:10px;
}

.tagline{
    font-size:1.8rem;
    color:#1c1e21;
    max-width:500px;
    line-height:1.3;
}

.right{
    width:400px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 12px rgba(0,0,0,.15);
}

input{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:1px solid #dddfe2;
    border-radius:6px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#1877f2;
}

.login-btn{
    width:100%;
    border:none;
    padding:14px;
    border-radius:6px;
    background:#1877f2;
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}

.login-btn:hover{
    opacity:.95;
}

.forgot{
    display:block;
    text-align:center;
    margin:15px 0;
    text-decoration:none;
    color:#1877f2;
}

hr{
    border:none;
    border-top:1px solid #ddd;
    margin:20px 0;
}

.signup-btn{
    display:block;
    margin:auto;
    border:none;
    padding:14px 18px;
    border-radius:6px;
    background:#42b72a;
    color:white;
    font-size:17px;
    font-weight:bold;
    cursor:pointer;
}

.signup-btn:hover{
    opacity:.95;
}

.page-text{
    text-align:center;
    margin-top:25px;
    color:#1c1e21;
    font-size:14px;
}

.page-text strong{
    font-weight:700;
}

@media(max-width:900px){

.container{
    flex-direction:column;
    text-align:center;
}

.right{
    width:100%;
    max-width:400px;
}

.logo{
    font-size:3rem;
}

.tagline{
    font-size:1.4rem;
}
}
</style>
</head>

<body>

<div class="container">

    <div class="left">
        <div class="logo">FRISCO</div>

        <div class="tagline">
            Connect with friends, share moments,
            and discover what's happening around you.
        </div>
    </div>

    <div class="right">

        <div class="card">

            <input type="email"
                   placeholder="Email address">

            <input type="password"
                   placeholder="Password">

            <button class="login-btn">
                Log In
            </button>

            <a href="#" class="forgot">
                Forgotten password?
            </a>

            <hr>

            <button class="signup-btn"
                    onclick="location.href='signup.html'">
                Create New Account
            </button>

        </div>

        <div class="page-text">
            <strong>Create a page</strong> for a business,
            brand or community.
        </div>

    </div>

</div>

</body>
    </html>
