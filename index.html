<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frisco - Welcome</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
}

body{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:
radial-gradient(circle at top, rgba(59,130,246,0.12), transparent 45%),
radial-gradient(circle at bottom, rgba(6,182,212,0.10), transparent 45%),
#0b1220;
color:#e5e7eb;
overflow:hidden;
position:relative;
}

/* subtle noise overlay feel */
body::before{
content:"";
position:absolute;
inset:0;
background:linear-gradient(transparent, rgba(255,255,255,0.02));
pointer-events:none;
}

/* soft floating light */
.glow{
position:absolute;
width:420px;
height:420px;
border-radius:50%;
filter:blur(120px);
opacity:0.25;
}

.glow.one{
background:#3b82f6;
top:-120px;
left:-120px;
}

.glow.two{
background:#06b6d4;
bottom:-140px;
right:-140px;
}

.container{
text-align:center;
max-width:780px;
padding:40px 24px;
position:relative;
z-index:2;
}

.brand{
font-size:12px;
letter-spacing:10px;
text-transform:uppercase;
color:#9ca3af;
margin-bottom:22px;
}

h1{
font-size:3.2rem;
font-weight:700;
line-height:1.1;
color:#f9fafb;
margin-bottom:18px;
}

h1 span{
background:linear-gradient(90deg,#60a5fa,#22d3ee);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.motto{
font-size:1.15rem;
color:#cbd5e1;
line-height:1.6;
margin-bottom:38px;
}

.motto strong{
color:#f9fafb;
font-weight:600;
}

.buttons{
display:flex;
justify-content:center;
gap:14px;
flex-wrap:wrap;
}

button{
padding:13px 26px;
border-radius:999px;
font-size:14px;
font-weight:600;
cursor:pointer;
transition:all 0.25s ease;
border:none;
}

.primary{
background:#f9fafb;
color:#0b1220;
box-shadow:0 10px 25px rgba(0,0,0,0.25);
}

.primary:hover{
transform:translateY(-2px);
}

.secondary{
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,255,255,0.12);
color:#e5e7eb;
backdrop-filter:blur(10px);
}

.secondary:hover{
background:rgba(255,255,255,0.10);
transform:translateY(-2px);
}

button:active{
transform:scale(0.98);
}

footer{
margin-top:45px;
font-size:12px;
color:#6b7280;
}

@media(max-width:600px){
h1{font-size:2.3rem;}
.motto{font-size:1rem;}
}
</style>
</head>

<body>

<div class="glow one"></div>
<div class="glow two"></div>

<div class="container">

    <div class="brand">FRISCO</div>

    <h1>Welcome to <span>Frisco</span></h1>

    <p class="motto">
        <strong>Be you.</strong> Be real. Be Frisco.
    </p>

    <div class="buttons">
        <button class="primary">Get Started</button>
        <button class="secondary">Explore</button>
    </div>

    <footer>
        © 2026 Frisco. Designed for authenticity.
    </footer>

</div>

</body>
</html>
