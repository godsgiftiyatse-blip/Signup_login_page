<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FRISCO</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Helvetica, Arial, sans-serif;
}

body{
    background:#f0f2f5;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

.container{
    width:100%;
    max-width:1100px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:60px;
}

.left{
    flex:1;
}

.logo{
    font-size:4rem;
    font-weight:700;
    color:#1877f2;
    margin-bottom:10px;
}

.tagline{
    font-size:1.8rem;
    color:#1c1e21;
    max-width:500px;
    line-height:1.3;
}

.right{
    width:400px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 12px rgba(0,0,0,.15);
}

input{
    width:100%;
    padding:14px;
    margin-bottom:12px;
    border:1px solid #dddfe2;
    border-radius:6px;
    font-size:16px;
}

input:focus{
    outline:none;
    border-color:#1877f2;
}

.login-btn{
    width:100%;
    border:none;
    padding:14px;
    border-radius:6px;
    background:#1877f2;
    color:white;
    font-size:20px;
    font-weight:bold;
    cursor:pointer;
}
