<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at 80% 70%, rgba(0,212,255,.35), transparent 35%),
    linear-gradient(135deg,#0f172a,#1e3a8a);
    padding:20px;
}

.card{
    width:100%;
    max-width:480px;
    padding:40px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.15);
    box-shadow:0 15px 40px rgba(0,0,0,.3);
    color:white;
}

.card h1{
    text-align:center;
    font-size:2.4rem;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#d1d5db;
    margin-bottom:30px;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:500;
}

input{
    width:100%;
    padding:15px;
    border:none;
    outline:none;
    border-radius:16px;
    background:rgba(255,255,255,0.15);
    color:white;
    font-size:15px;
}

input::placeholder{
    color:#d1d5db;
}

.signup-btn{
    width:100%;
    border:none;
    padding:15px;
    border-radius:16px;
    margin-top:15px;
    background:linear-gradient(90deg,#2563eb,#3b82f6);
    color:white;
    font-size:18px;
    font-weight:600;
    cursor:pointer;
}

.signup-btn:hover{
    opacity:.9;
}

.divider{
    display:flex;
    align-items:center;
    margin:30px 0;
    color:#d1d5db;
}

.divider::before,
.divider::after{
    content:"";
    flex:1;
    height:1px;
    background:rgba(255,255,255,.3);
}

.divider span{
    padding:0 15px;
}

.social-btn{
    width:100%;
    padding:14px;
    margin-bottom:15px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,0.15);
    color:white;
    cursor:pointer;
    font-size:16px;
}

.social-btn:hover{
    background:rgba(255,255,255,0.2);
}

.login-link{
    margin-top:25px;
    text-align:center;
    color:#d1d5db;
}

.login-link a{
    color:white;
    font-weight:600;
    text-decoration:none;
}

.login-link a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="card">

    <h1>Create Account</h1>
    <p class="subtitle">Join the community</p>

    <form>

        <div class="form-group">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your full name">
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" placeholder="Enter your email">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" placeholder="Create a password">
        </div>

        <div class="form-group">
            <label>Confirm Password</label>
            <input type="password" placeholder="Confirm password">
        </div>

        <button type="submit" class="signup-btn">
            Create Account
        </button>

        <div class="divider">
            <span>OR</span>
        </div>

        <button type="button" class="social-btn">
            Continue with Google
        </button>

        <button type="button" class="social-btn">
            Continue with GitHub
        </button>

        <div class="login-link">
            Already have an account?
            <a href="login.html">Login</a>
        </div>

    </form>

</div>

</body>
</html>
